{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{{ product.name }}</title>
</head>
<body>
    <div>
        <h1>{{ product.name }}</h1>
        <hr>
        <p><img src="{{ product.image.url }}" style="width:500px;height:500px;border:2px solid #CCCCCC;"></p>
        <p>Цена: {{ product.price }}</p>
         <p>{{ product.description }}</p>
        </div>
</body>
</html>
